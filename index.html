<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORATABI – Travel Magazine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* --- スタイルは元のものをベースに、最適化を維持しています --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#f7f2ec;color:#111;overflow-x:hidden}
img{display:block;width:100%;height:100%;object-fit:cover}
button,a{cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none}
:root{--ink:#111810;--white:#fff;--coral:#d95f3b;--teal:#0a5c4e;--sand:#f7f2ec;--mist:#e8e0d5;--gray:#6b6560}

#nav{position:fixed;top:0;left:0;right:0;z-index:300;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,6vw,80px);transition:0.35s}
#nav.solid{background:rgba(252,249,244,.96);border-bottom:1px solid rgba(0,0,0,.08);backdrop-filter:blur(14px)}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;letter-spacing:3px;color:var(--white);transition:0.35s}
#nav.solid .logo-text{color:var(--ink)}
.logo-text span{color:var(--coral)}
.nav-links{display:flex;gap:10px;align-items:center}
.nav-link{background:none;border:none;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.8);padding:4px 14px;transition:0.2s}
#nav.solid .nav-link{color:var(--gray)}
.nav-cta{padding:8px 22px;background:var(--coral);border:none;border-radius:40px;color:var(--white);font-size:11px;letter-spacing:1.5px}

.page{display:none}
.page.active{display:block}

#hero{position:relative;height:100vh;overflow:hidden;background:#000}
#hero-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity 0.8s ease}
#hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.2),rgba(0,0,0,0.6))}
#hero-content{position:absolute;bottom:15%;left:clamp(20px,8vw,96px);max-width:700px;z-index:10;color:#fff}
#hero-tag{display:inline-block;background:var(--coral);padding:4px 12px;font-size:10px;letter-spacing:2px;margin-bottom:15px}
#hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,7vw,80px);line-height:1.1;margin-bottom:20px}
#hero-dots{position:absolute;bottom:40px;right:5vw;display:flex;gap:10px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.3);border:none;cursor:pointer}
.dot.active{background:var(--coral);width:30px;border-radius:10px}

.section{padding:80px clamp(16px,6vw,80px)}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,42px);margin-bottom:40px}
.cards-hero-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:20px}
.card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.05);transition:0.3s}
.card:hover{transform:translateY(-5px)}
.card-img{height:250px;position:relative}
.card-img-tall{height:550px}
.card-body{padding:20px}

/* その他、MosaicやNewsletter、Footerのスタイルは継承 */
.mosaic{display:grid;grid-template-columns:repeat(4,1fr);height:600px}
.mosaic-cell{position:relative;overflow:hidden}
.nl{background:var(--teal);color:#fff;padding:100px 20px;text-align:center}
footer{background:var(--ink);color:#fff;padding:40px clamp(16px,6vw,80px);display:flex;justify-content:space-between}

@media(max-width:768px){
    .cards-hero-grid{grid-template-columns:1fr}
    .mosaic{grid-template-columns:repeat(2,1fr);height:auto}
    .mosaic-cell{height:250px}
}
</style>
</head>
<body>

<nav id="nav">
    <a href="#" class="logo" onclick="showPage('top');return false">
        <div class="logo-text">SORA<span>TABI</span></div>
    </a>
    <div class="nav-links">
        <button class="nav-link" onclick="showPage('top')">TOP</button>
        <button class="nav-link" onclick="showPage('list')">記事一覧</button>
        <button class="nav-cta">旅に出る</button>
    </div>
</nav>

<div id="page-top" class="page active">
    <section id="hero">
        <img id="hero-photo" src="" alt="">
        <div id="hero-overlay"></div>
        <div id="hero-content">
            <span id="hero-tag"></span>
            <h1 id="hero-title"></h1>
            <p id="hero-sub" style="margin-bottom:30px; color:rgba(255,255,255,0.8)"></p>
            <div class="hero-btns">
                <button class="btn-primary" style="padding:15px 40px; background:var(--coral); border:none; color:#fff; border-radius:40px;">詳しく見る</button>
            </div>
        </div>
        <div id="hero-dots"></div>
    </section>

    <div class="section">
        <h2 class="section-title">今週のおすすめ旅先</h2>
        <div class="cards-hero-grid" id="featured-cards"></div>
    </div>

    <div class="mosaic" id="mosaic"></div>

    <div class="nl">
        <h2 class="section-title" style="color:#fff">旅のインスピレーションを毎週お届け</h2>
        <p style="margin-bottom:30px; opacity:0.7">厳選した旅先情報をお届けします</p>
        <div style="display:flex; justify-content:center; gap:10px; max-width:500px; margin:0 auto">
            <input type="text" placeholder="メールアドレス" style="padding:15px; border-radius:30px; border:none; flex:1">
            <button style="padding:15px 30px; border-radius:30px; border:none; background:var(--coral); color:#fff">登録</button>
        </div>
    </div>

    <footer>
        <div class="logo-text">SORA<span>TABI</span></div>
        <p style="opacity:0.3; font-size:12px">© 2026 SORATABI</p>
    </footer>
</div>

<div id="page-list" class="page">
    <div style="height:40vh; position:relative; overflow:hidden">
        <img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=1600" alt="">
        <div style="position:absolute; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center">
            <h1 style="color:#fff; font-family:'Cormorant Garamond',serif; font-size:50px">旅の記事一覧</h1>
        </div>
    </div>
    <div class="section">
        <div id="list-cards" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:30px"></div>
    </div>
</div>
